<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Contábil</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: #23458b;
  color: white;
  cursor: pointer;
  border: none;
  transition: 0.3s;
}

button:hover {
  background: #1b366d;
}

canvas {
  width: 100%;
  max-width: 320px;
  margin-top: 20px;
  border-radius: 8px;
}

#resultado {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gerador Contábil</h2>

  <input id="tema" placeholder="Ex: MEI, Imposto de Renda">

  <button onclick="gerarCarrossel()">
    Gerar Slides
  </button>
</div>

<div id="resultado"></div>

<script>

// BASE CONTÁBIL
const gatilhos = [
"Você pode estar cometendo um erro grave em",
"Quase ninguém entende isso sobre",
"Atenção com",
"Erro comum em",
"Você realmente domina"
];

const problemas = [
"muitas empresas pagam imposto errado",
"erros podem gerar multas pesadas",
"falta de controle financeiro prejudica",
"a desorganização custa caro",
"pequenos erros viram grandes prejuízos"
];

const impactos = [
"isso pode te levar para a malha fina",
"você pode perder dinheiro sem perceber",
"seu negócio pode sofrer penalidades",
"isso pode gerar problemas fiscais",
"seu lucro pode estar sendo reduzido"
];

const solucoes = [
"mas isso pode ser evitado facilmente",
"com organização tudo muda",
"com orientação correta você resolve",
"existe uma forma simples de corrigir",
"você pode ajustar isso rapidamente"
];

const acoes = [
"revise isso hoje",
"organize sua contabilidade",
"evite problemas futuros",
"comece a corrigir agora",
"tome controle da sua empresa"
];

// TEMAS
const termosContabeis = [
"Simples Nacional",
"MEI",
"Imposto de Renda",
"Lucro Presumido",
"Lucro Real",
"Fluxo de Caixa",
"Planejamento Tributário",
"Nota Fiscal"
];

// IMAGENS POR TEMA
const imagensTema = {
  "MEI": "https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1200&auto=format&fit=crop",
  "Simples Nacional": "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=1200&auto=format&fit=crop",
  "Imposto de Renda": "https://images.unsplash.com/photo-1554224154-26032ffc0d07?q=80&w=1200&auto=format&fit=crop",
  "Lucro Presumido": "https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop",
  "Lucro Real": "https://images.unsplash.com/photo-1450101499163-c8848c66ca85?q=80&w=1200&auto=format&fit=crop",
  "Fluxo de Caixa": "https://images.unsplash.com/photo-1556740749-887f6717d7e4?q=80&w=1200&auto=format&fit=crop",
  "Planejamento Tributário": "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=1200&auto=format&fit=crop",
  "Nota Fiscal": "https://images.unsplash.com/photo-1554224154-22dec7ec8818?q=80&w=1200&auto=format&fit=crop"
};

// RANDOM
function random(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

// GERAR TEXTO
function gerarRoteiro(tema){

  if(!tema){
    tema = random(termosContabeis);
  }

  return [
    `${random(gatilhos)} ${tema}?`,
    `${random(problemas)}`,
    `${random(impactos)}`,
    `${random(solucoes)}`,
    `${random(acoes)} relacionado a ${tema}`
  ];
}

// FUNDO
function gerarFundo(ctx, tema, callback){

  const imagem = new Image();

  const urlImagem = imagensTema[tema] ||
  "https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1200&auto=format&fit=crop";

  imagem.crossOrigin = "anonymous";
  imagem.src = urlImagem;

  imagem.onload = function(){

    ctx.drawImage(imagem, 0, 0, 1080, 1080);

    // camada escura
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(0,0,1080,1080);

    callback();
  };
}

// TEXTO
function desenharTexto(ctx, texto){

  ctx.fillStyle = "white";
  ctx.font = "bold 62px Arial";
  ctx.textAlign = "center";

  const palavras = texto.split(" ");

  let linhas = [];
  let linha = "";

  palavras.forEach(p => {

    const teste = linha + p + " ";

    if(ctx.measureText(teste).width > 820){
      linhas.push(linha);
      linha = p + " ";
    } else {
      linha = teste;
    }
  });

  linhas.push(linha);

  let y = 450 - (linhas.length * 30);

  linhas.forEach(l => {
    ctx.fillText(l, 540, y);
    y += 75;
  });
}

// LOGO
function desenharLogo(ctx, callback){

  const logo = new Image();

  // coloque sua logo no mesmo diretório
  logo.src = "logo.png";

  logo.onload = function(){

    const largura = 300;
    const altura = (logo.height / logo.width) * largura;

    ctx.fillStyle = "rgba(255,255,255,0.88)";
    ctx.fillRect(270, 890, 540, 130);

    ctx.drawImage(
      logo,
      (1080 - largura) / 2,
      910,
      largura,
      altura
    );

    if(callback) callback();
  };

  logo.onerror = function(){
    if(callback) callback();
  };
}

// GERAR CARROSSEL
function gerarCarrossel(){

  const tema = document.getElementById("tema").value;
  const roteiro = gerarRoteiro(tema);
  const resultado = document.getElementById("resultado");

  resultado.innerHTML = "";

  roteiro.forEach((texto, i) => {

    const canvas = document.createElement("canvas");

    canvas.width = 1080;
    canvas.height = 1080;

    const ctx = canvas.getContext("2d");

    gerarFundo(ctx, tema, () => {

      desenharTexto(ctx, texto);

      desenharLogo(ctx, () => {

        resultado.appendChild(canvas);

        const btn = document.createElement("button");

        btn.innerText = "Baixar slide " + (i + 1);

        btn.onclick = () => {

          const link = document.createElement("a");

          link.download = "slide_" + (i + 1) + ".png";
          link.href = canvas.toDataURL("image/png");

          link.click();
        };

        resultado.appendChild(btn);
      });
    });
  });
}

</script>

</body>
</html>
