<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Carrossel</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 10px;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  font-size: 16px;
  border-radius: 5px;
  cursor: pointer;
}

#resultado {
  margin-top: 20px;
}

canvas {
  margin: 15px 0;
  width: 100%;
  max-width: 320px;
  border: 1px solid #ccc;
}

.download-btn {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gerador de Carrossel</h2>
  <input id="tema" placeholder="Digite o tema (ex: imposto de renda)">
  <button onclick="gerarCarrossel()">Gerar Slides</button>
</div>

<div id="resultado"></div>

<script>
function gerarRoteiro(tema){
  return [
    "Você já declarou seu " + tema + "?",
    "Muitas pessoas ignoram essa obrigação...",
    "Isso pode gerar multas e problemas legais",
    "Evite dores de cabeça com a Receita",
    "Faça sua declaração agora mesmo"
  ];
}

function gerarFundo(ctx, tema){
  const grad = ctx.createLinearGradient(0,0,1080,1080);

  if(tema.includes("imposto")){
    grad.addColorStop(0,"#0f2027");
    grad.addColorStop(1,"#203a43");
  } else if(tema.includes("dinheiro")){
    grad.addColorStop(0,"#134E5E");
    grad.addColorStop(1,"#71B280");
  } else {
    grad.addColorStop(0,"#232526");
    grad.addColorStop(1,"#414345");
  }

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,1080,1080);
}

function desenharTexto(ctx, texto){
  ctx.fillStyle = "white";
  ctx.font = "bold 64px Arial";
  ctx.textAlign = "center";

  const linhas = quebrarTexto(ctx, texto, 850);

  let y = 500 - (linhas.length * 40);

  linhas.forEach(l => {
    ctx.fillText(l, 540, y);
    y += 80;
  });
}

function desenharRodape(ctx){
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.font = "28px Arial";
  ctx.textAlign = "center";

  ctx.fillText("Contábil Sheets", 540, 1020);
}

function quebrarTexto(ctx, texto, maxWidth){
  let palavras = texto.split(" ");
  let linhas = [];
  let linha = "";

  palavras.forEach(p => {
    let teste = linha + p + " ";
    let largura = ctx.measureText(teste).width;

    if(largura > maxWidth){
      linhas.push(linha);
      linha = p + " ";
    } else {
      linha = teste;
    }
  });

  linhas.push(linha);
  return linhas;
}

function gerarCarrossel(){
  const temaInput = document.getElementById("tema").value;

  if(!temaInput){
    alert("Digite um tema");
    return;
  }

  const tema = temaInput.toLowerCase();
  const roteiro = gerarRoteiro(tema);
  const resultado = document.getElementById("resultado");

  resultado.innerHTML = "";

  roteiro.forEach((texto, i) => {

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const ctx = canvas.getContext("2d");

    gerarFundo(ctx, tema);
    desenharTexto(ctx, texto);
    desenharRodape(ctx);

    resultado.appendChild(canvas);

    const btn = document.createElement("button");
    btn.classList.add("download-btn");
    btn.innerText = "Baixar slide " + (i+1);

    btn.onclick = () => {
      const link = document.createElement("a");
      link.download = "slide_" + (i+1) + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

    resultado.appendChild(btn);
  });
}
</script>

</body>
</html>
