<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Contábil</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

canvas {
  width: 100%;
  max-width: 320px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gerador Contábil</h2>
  <input id="tema" placeholder="Ex: Simples Nacional">
  <button onclick="gerarCarrossel()">Gerar Slides</button>
</div>

<div id="resultado"></div>

<script>

// 🧠 BASE INTELIGENTE CONTÁBIL
const gatilhos = [
"Você pode estar cometendo um erro grave em",
"Quase ninguém entende isso sobre",
"Atenção com",
"Erro comum em",
"Você realmente domina"
];

const problemas = [
"muitas empresas pagam imposto errado",
"erros podem gerar multas pesadas",
"falta de controle financeiro prejudica",
"a desorganização custa caro",
"pequenos erros viram grandes prejuízos"
];

const impactos = [
"isso pode te levar para a malha fina",
"você pode perder dinheiro sem perceber",
"seu negócio pode sofrer penalidades",
"isso pode gerar problemas fiscais",
"seu lucro pode estar sendo reduzido"
];

const solucoes = [
"mas isso pode ser evitado facilmente",
"com organização tudo muda",
"com orientação correta você resolve",
"existe uma forma simples de corrigir",
"você pode ajustar isso rapidamente"
];

const acoes = [
"revise isso hoje",
"organize sua contabilidade",
"evite problemas futuros",
"comece a corrigir agora",
"tome controle da sua empresa"
];

// 🎯 PALAVRAS CONTÁBEIS (gera contexto)
const termosContabeis = [
"Simples Nacional",
"MEI",
"Imposto de Renda",
"Lucro Presumido",
"Lucro Real",
"Folha de Pagamento",
"Fluxo de Caixa",
"Planejamento Tributário",
"Nota Fiscal",
"Obrigações Fiscais"
];

// 🔀 RANDOM
function random(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

// 🚀 GERAR ROTEIRO INTELIGENTE
function gerarRoteiro(tema){

  if(!tema){
    tema = random(termosContabeis);
  }

  return [
    `${random(gatilhos)} ${tema}?`,
    `${random(problemas)}`,
    `${random(impactos)}`,
    `${random(solucoes)}`,
    `${random(acoes)} relacionado a ${tema}`
  ];
}

// 🎨 FUNDO
function gerarFundo(ctx){
  const grad = ctx.createLinearGradient(0,0,1080,1080);
  grad.addColorStop(0,"#1e3c72");
  grad.addColorStop(1,"#2a5298");

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,1080,1080);
}

// 📝 TEXTO
function desenharTexto(ctx, texto){
  ctx.fillStyle = "white";
  ctx.font = "bold 60px Arial";
  ctx.textAlign = "center";

  const palavras = texto.split(" ");
  let linhas = [];
  let linha = "";

  palavras.forEach(p => {
    let teste = linha + p + " ";
    if(ctx.measureText(teste).width > 800){
      linhas.push(linha);
      linha = p + " ";
    } else {
      linha = teste;
    }
  });

  linhas.push(linha);

  let y = 450 - (linhas.length * 30);

  linhas.forEach(l => {
    ctx.fillText(l, 540, y);
    y += 70;
  });
}

// 🖼️ LOGO (RECOMENDO SUBIR NO GITHUB)
function desenharLogo(ctx){
  const logo = new Image();
  logo.src = "https://raw.githubusercontent.com/SEU-USUARIO/SEU-REPO/main/logo.png";

  logo.onload = function(){
    const largura = 250;
    const altura = (logo.height / logo.width) * largura;
    ctx.drawImage(logo, (1080-largura)/2, 900, largura, altura);
  };
}

// 🚀 GERAR CARROSSEL
function gerarCarrossel(){

  const tema = document.getElementById("tema").value;
  const roteiro = gerarRoteiro(tema);
  const resultado = document.getElementById("resultado");

  resultado.innerHTML = "";

  roteiro.forEach((texto, i) => {

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const ctx = canvas.getContext("2d");

    gerarFundo(ctx);
    desenharTexto(ctx, texto);
    desenharLogo(ctx);

    resultado.appendChild(canvas);

    const btn = document.createElement("button");
    btn.innerText = "Baixar slide " + (i+1);

    btn.onclick = () => {
      const link = document.createElement("a");
      link.download = "slide_" + (i+1) + ".png";
      link.href = canvas.toDataURL();
      link.click();
    };

    resultado.appendChild(btn);
  });
}

</script>

</body>
</html>
