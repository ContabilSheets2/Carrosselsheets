<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador Contábil</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  text-align: center;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.08);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #23458b;
  color: white;
  cursor: pointer;
  border: none;
}

canvas {
  width: 100%;
  max-width: 320px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gerador Contábil</h2>
  <input id="tema" placeholder="Ex: MEI, Imposto de Renda">
  <button onclick="gerarCarrossel()">Gerar Slides</button>
</div>

<div id="resultado"></div>

<script>

const gatilhos = [
"Atenção com",
"Erro comum em",
"Você realmente domina"
];

const problemas = [
"muitas empresas pagam imposto errado",
"erros podem gerar multas pesadas",
"a desorganização custa caro"
];

const impactos = [
"isso pode te levar para a malha fina",
"você pode perder dinheiro",
"seu negócio pode sofrer penalidades"
];

const solucoes = [
"mas isso pode ser evitado facilmente",
"com organização tudo muda",
"você pode ajustar isso rapidamente"
];

const termosContabeis = [
"MEI","Imposto de Renda","Fluxo de Caixa"
];

const imagensTema = {
  "default": [
    "https://images.pexels.com/photos/6693655/pexels-photo-6693655.jpeg",
    "https://images.pexels.com/photos/6863183/pexels-photo-6863183.jpeg"
  ]
};

function random(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function gerarRoteiro(tema){
  if(!tema) tema = random(termosContabeis);

  return [
    `${random(gatilhos)} ${tema}?`,
    `${random(problemas)}`,
    `${random(impactos)}`,
    `${random(solucoes)}`,
    `Fale comigo`
  ];
}

function gerarFundo(ctx, tema, i, callback){
  const img = new Image();
  const imagens = imagensTema["default"];

  img.crossOrigin = "anonymous";
  img.src = imagens[i % imagens.length];

  img.onload = () => {
    ctx.drawImage(img, 0, 0, 1080, 1080);
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(0,0,1080,1080);
    callback();
  };
}

function desenharTexto(ctx, texto){
  ctx.fillStyle = "white";
  ctx.font = "bold 62px Arial";
  ctx.textAlign = "center";

  const palavras = texto.split(" ");
  let linhas = [];
  let linha = "";

  palavras.forEach(p => {
    const teste = linha + p + " ";
    if(ctx.measureText(teste).width > 820){
      linhas.push(linha);
      linha = p + " ";
    } else {
      linha = teste;
    }
  });

  linhas.push(linha);

  let y = 450 - (linhas.length * 30);

  linhas.forEach(l => {
    ctx.fillText(l, 540, y);
    y += 75;
  });
}

// 🔥 LOGO AJUSTADA (SUBIDA)
function desenharLogo(ctx, callback){

  const logo = new Image();
  logo.src = "https://drive.google.com/thumbnail?id=1k6sHQ7CTZ2zJdhjJajLWB-0LNNJbfQPm&sz=w1000";

  logo.onload = function(){

    const largura = 300;
    const altura = (logo.height / logo.width) * largura;

    ctx.drawImage(
      logo,
      (1080 - largura) / 2,
      850, // 👈 SUBIU AQUI
      largura,
      altura
    );

    if(callback) callback();
  };
}

function gerarCarrossel(){

  const tema = document.getElementById("tema").value;
  const roteiro = gerarRoteiro(tema);
  const resultado = document.getElementById("resultado");

  resultado.innerHTML = "";

  roteiro.forEach((texto, i) => {

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const ctx = canvas.getContext("2d");

    gerarFundo(ctx, tema, i, () => {

      desenharTexto(ctx, texto);

      desenharLogo(ctx, () => {

        resultado.appendChild(canvas);

        const btn = document.createElement("button");
        btn.innerText = "Baixar slide " + (i+1);

        btn.onclick = () => {
          const link = document.createElement("a");
          link.download = "slide_" + (i+1) + ".png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        };

        resultado.appendChild(btn);
      });
    });
  });
}

</script>

</body>
</html>
